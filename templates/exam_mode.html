{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="fas fa-edit me-2"></i>Exam Score Entry & Assessment</h4>
                </div>
                <div class="card-body">
                    <p class="text-muted">Enter your academic performance details to get a personalized study plan and professional level assessment.</p>
                    
                    <div id="subjectsContainer">
                        <!-- Subject entries will be added here dynamically -->
                    </div>
                    
                    <div class="mt-3">
                        <button class="btn btn-outline-primary" onclick="addSubject()">
                            <i class="fas fa-plus-circle me-1"></i>Add Subject
                        </button>
                        <button class="btn btn-primary float-end" onclick="submitExamScores()">
                            <i class="fas fa-calculator me-1"></i>Assess My Level
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Results Section (hidden initially) -->
    <div class="row" id="resultsSection" style="display: none;">
        <div class="col-md-6 mb-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="fas fa-level-up-alt me-2"></i>Professional Level Assessment</h5>
                </div>
                <div class="card-body" id="assessmentResult">
                    <!-- Filled by JavaScript -->
                </div>
            </div>
        </div>
        <div class="col-md-6 mb-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-info text-white">
                    <h5 class="mb-0"><i class="fas fa-book me-2"></i>Personalized Study Plan</h5>
                </div>
                <div class="card-body" id="studyPlanResult">
                    <!-- Filled by JavaScript -->
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let subjectCount = 0;

function addSubject() {
    subjectCount++;
    const container = document.getElementById('subjectsContainer');
    
    const subjectDiv = document.createElement('div');
    subjectDiv.className = 'card mb-3 border-primary subject-entry';
    subjectDiv.id = `subject-${subjectCount}`;
    subjectDiv.innerHTML = `
        <div class="card-header d-flex justify-content-between align-items-center bg-light">
            <h6 class="mb-0">Subject #${subjectCount}</h6>
            <button class="btn btn-sm btn-outline-danger" onclick="removeSubject(${subjectCount})">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6 mb-2">
                    <label class="form-label">Subject Name</label>
                    <input type="text" class="form-control subject-name" placeholder="e.g., Data Structures" required>
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label">Semester</label>
                    <select class="form-select semester">
                        <option value="1">Semester 1</option>
                        <option value="2">Semester 2</option>
                        <option value="3">Semester 3</option>
                        <option value="4">Semester 4</option>
                        <option value="5">Semester 5</option>
                        <option value="6">Semester 6</option>
                        <option value="7">Semester 7</option>
                        <option value="8">Semester 8</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 mb-2">
                    <label class="form-label">Theory Marks (0-100)</label>
                    <input type="number" class="form-control theory-marks" min="0" max="100" value="0" required>
                </div>
                <div class="col-md-4 mb-2">
                    <label class="form-label">Practical Marks (0-100)</label>
                    <input type="number" class="form-control practical-marks" min="0" max="100" value="0" required>
                </div>
                <div class="col-md-4 mb-2">
                    <label class="form-label">Understanding Level (1-10)</label>
                    <input type="number" class="form-control understanding-level" min="1" max="10" value="5" required>
                    <div class="form-text">1 = Poor, 10 = Excellent</div>
                </div>
            </div>
        </div>
    `;
    
    container.appendChild(subjectDiv);
}

function removeSubject(id) {
    document.getElementById(`subject-${id}`).remove();
}

function submitExamScores() {
    const entries = document.querySelectorAll('.subject-entry');
    const subjects = [];
    
    entries.forEach(entry => {
        const name = entry.querySelector('.subject-name').value.trim();
        const theory = parseFloat(entry.querySelector('.theory-marks').value) || 0;
        const practical = parseFloat(entry.querySelector('.practical-marks').value) || 0;
        const understanding = parseInt(entry.querySelector('.understanding-level').value) || 1;
        const semester = parseInt(entry.querySelector('.semester').value);
        
        if (name) {
            subjects.push({
                name: name,
                theory: theory,
                practical: practical,
                understanding: understanding,
                semester: semester
            });
        }
    });
    
    if (subjects.length === 0) {
        alert('Please add at least one subject with a name.');
        return;
    }
    
    fetch('/exam-mode', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ subjects: subjects })
    })
    .then(response => response.json())
    .then(data => {
        displayResults(data);
    })
    .catch(error => {
        console.error('Error:', error);
        alert('An error occurred. Please try again.');
    });
}

function displayResults(data) {
    // Show results section
    document.getElementById('resultsSection').style.display = 'flex';
    
    // Assessment Result
    const assessment = data.assessment;
    const levels = {
        1: 'Beginner',
        2: 'Intermediate',
        3: 'Advanced',
        4: 'Expert'
    };
    
    document.getElementById('assessmentResult').innerHTML = `
        <div class="text-center mb-3">
            <div class="display-1 text-success">${assessment.level}</div>
            <h5>${levels[assessment.level]} Level</h5>
            <p class="text-muted">${assessment.description}</p>
        </div>
        <div>
            <h6>Score Breakdown:</h6>
            <div class="mb-2">
                <label>Theory: ${assessment.scores.theory.toFixed(1)}%</label>
                <div class="progress">
                    <div class="progress-bar bg-primary" style="width: ${assessment.scores.theory}%">${assessment.scores.theory.toFixed(1)}%</div>
                </div>
            </div>
            <div class="mb-2">
                <label>Practical: ${assessment.scores.practical.toFixed(1)}%</label>
                <div class="progress">
                    <div class="progress-bar bg-success" style="width: ${assessment.scores.practical}%">${assessment.scores.practical.toFixed(1)}%</div>
                </div>
            </div>
            <div class="mb-2">
                <label>Understanding: ${assessment.scores.understanding.toFixed(1)}/10</label>
                <div class="progress">
                    <div class="progress-bar bg-info" style="width: ${assessment.scores.understanding * 10}%">${assessment.scores.understanding.toFixed(1)}/10</div>
                </div>
            </div>
        </div>
    `;
    
    // Study Plan Result
    const plan = data.study_plan;
    document.getElementById('studyPlanResult').innerHTML = `
        <div class="mb-3">
            <h6><i class="fas fa-exclamation-triangle text-warning"></i> Focus Areas:</h6>
            <ul class="list-group">
                ${plan.focus_areas.length > 0 ? 
                    plan.focus_areas.map(subject => 
                        `<li class="list-group-item list-group-item-warning">${subject}</li>`
                    ).join('') 
                    : '<li class="list-group-item list-group-item-success">No weak areas detected!</li>'}
            </ul>
        </div>
        <div class="mb-3">
            <h6><i class="fas fa-check-circle text-success"></i> Strengths:</h6>
            <ul class="list-group">
                ${plan.strengths.length > 0 ? 
                    plan.strengths.map(subject => 
                        `<li class="list-group-item list-group-item-success">${subject}</li>`
                    ).join('') 
                    : '<li class="list-group-item">Complete exam entry to identify strengths</li>'}
            </ul>
        </div>
        <div>
            <h6><i class="fas fa-lightbulb text-primary"></i> Recommendations:</h6>
            <ul class="list-group">
                ${plan.recommendations.map(rec => 
                    `<li class="list-group-item"><i class="fas fa-arrow-right me-2"></i>${rec}</li>`
                ).join('')}
            </ul>
        </div>
    `;
    
    // Scroll to results
    document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
}

// Add first subject automatically
document.addEventListener('DOMContentLoaded', function() {
    addSubject();
});
</script>
{% endblock %}
